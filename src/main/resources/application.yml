server:
  port: 8080

spring:
  application:
    name: review-service
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  cache:
    type: redis
    redis:
      time-to-live: 600000 # 10min
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest
#  config:
#    import:
#    - optional:configserver:http://localhost:8085
    
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka
      
#zipkin
management:
  tracing:
    sampling:
      probability: 1.0 